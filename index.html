<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수원장안경찰서 긴급 안심 신고 서비스</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f0f4f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }
        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            background: white;
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            box-sizing: border-box;
        }
        /* 경찰서 공식 상단 로고 영역 */
        .police-header {
            background-color: #0b2240; /* 경찰 네이비 */
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2);
        }
        .police-sub {
            font-size: 11px;
            color: #b0c4de;
            font-weight: normal;
            margin-top: 2px;
        }
        h1 {
            color: #222;
            font-size: 22px;
            margin: 10px 0 5px 0;
            letter-spacing: -0.5px;
        }
        .main-desc {
            color: #666;
            font-size: 13px;
            margin-bottom: 25px;
        }
        /* 버튼 디자인 보강 */
        .btn {
            display: block;
            width: 100%;
            padding: 22px 0;
            margin: 16px 0;
            font-size: 24px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 10px rgba(0,0,0,0.15);
            transition: all 0.1s ease;
            box-sizing: border-box;
        }
        .btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }
        .btn-112 { background-color: #1a5276; } /* 경찰 블루 */
        .btn-119 { background-color: #cb4335; } /* 소방 레드 */
        
        /* 위치 정보 영역 가시성 극대화 */
        #location-box {
            margin-top: 25px;
            padding: 18px;
            background-color: #f7f9fa;
            border: 2px solid #dcdde1;
            border-radius: 12px;
            font-size: 14px;
            color: #333;
            text-align: left;
        }
        .box-title {
            font-weight: bold;
            font-size: 15px;
            border-bottom: 1px solid #dcdde1;
            padding-bottom: 8px;
            margin-bottom: 10px;
            color: #0b2240;
        }
        .loading { color: #e67e22; font-weight: bold; }
        .success { color: #27ae60; font-weight: bold; }
        .error { color: #c0392b; font-weight: bold; }
        
        .alert-text {
            margin-top: 12px;
            padding: 8px;
            background-color: #fadbd8;
            color: #78281f;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            border: 1px solid #f5b7b1;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 경찰서 공식 헤더 추가 -->
    <div class="police-header">
        <div>
            🦅 수원장안경찰서
            <div class="police-sub">JANGAN POLICE STATION • 스마트 안심 안심존</div>
        </div>
    </div>

    <h1>🚨 긴급 신고 서비스</h1>
    <div class="main-desc">버튼을 터치하면 즉시 112 또는 119 다이얼로 연결됩니다.</div>

    <!-- 112 / 119 호출 버튼 -->
    <a href="tel:112" class="btn btn-112">경찰 (112) 호출</a>
    <a href="tel:119" class="btn btn-119">소방 (119) 호출</a>

    <!-- 위치 안내 영역 -->
    <div id="location-box">
        <div class="box-title">📍 현위치 GPS 좌표 확인</div>
        <span id="status" class="loading">브라우저 상단 팝업의 '위치 권한'을 반드시 [허용]해 주세요.</span>
        <div id="coordinates"></div>
    </div>
</div>

<script>
    window.onload = function() {
        const status = document.getElementById('status');
        const coordinates = document.getElementById('coordinates');

        if (!navigator.geolocation) {
            status.textContent = "본 기기는 GPS 위치 추적을 지원하지 않습니다.";
            status.className = "error";
            return;
        }

        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        function success(position) {
            const latitude  = position.coords.latitude;
            const longitude = position.coords.longitude;
            const accuracy  = position.coords.accuracy;

            status.textContent = "위치 정보 수신 성공";
            status.className = "success";
            
            coordinates.innerHTML = `
                <div style="margin-top: 10px; line-height: 1.6;">
                    <strong>• 위도(Latitude):</strong> ${latitude.toFixed(6)} <br>
                    <strong>• 경도(Longitude):</strong> ${longitude.toFixed(6)} <br>
                    <span style="font-size:11px; color:#7f8c8d;">(측위 오차범위: 약 ${Math.round(accuracy)}m 이내)</span>
                </div>
                <div class="alert-text">※ 112/119 상담원에게 위의 위도, 경도 좌표를 그대로 읽어주세요!</div>
            `;
        }

        function error(err) {
            status.className = "error";
            switch(err.code) {
                case err.PERMISSION_DENIED:
                    status.textContent = "위치 권한 허용이 거부되었습니다. 주소창 왼쪽 설정에서 권한을 다시 '허용'으로 변경해 주세요.";
                    break;
                case err.POSITION_UNAVAILABLE:
                    status.textContent = "GPS 신호가 약해 위치 정보를 가져올 수 없습니다. 건물 밖이나 열린 공간에서 다시 시도해 주세요.";
                    break;
                case err.TIMEOUT:
                    status.textContent = "위치 정보 요청 시간이 초과되었습니다. 페이지를 새로고침 해보세요.";
                    break;
                default:
                    status.textContent = "위치 수신 중 알 수 없는 오류가 발생했습니다.";
                    break;
            }
        }

        navigator.geolocation.getCurrentPosition(success, error, options);
    };
</script>

</body>
</html>
